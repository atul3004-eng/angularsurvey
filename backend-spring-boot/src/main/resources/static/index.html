<!doctype html>
<html lang="en" ng-app="surveyLegacyApp">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Survey Application</title>
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="stylesheet" href="vendor/bootstrap.min.css">
  <link rel="stylesheet" href="app/app.css">
</head>
<body ng-controller="AppController as app">
  <header class="site-header shadow-sm">
    <nav class="navbar navbar-expand-lg">
      <div class="shell">
        <div class="topbar">
          <a href="#/login" class="brand navbar-brand mb-0">Survey Application</a>
          <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#topNav" aria-controls="topNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse" id="topNav">
            <nav class="nav-links navbar-nav me-auto mb-2 mb-lg-0" ng-if="app.showAdminNav()">
              <a href="#/admin" class="nav-link" ng-class="{ active: app.isPath('/admin') }">Admin Home</a>
              <a href="#/createSurvey" class="nav-link" ng-class="{ active: app.isPath('/createSurvey') }">Create Survey</a>
              <a href="#/addAdmin" class="nav-link" ng-class="{ active: app.isPath('/addAdmin') }">Add Admin</a>
            </nav>
            <div class="nav-actions ms-auto">
              <span class="admin-pill badge rounded-pill text-bg-light" ng-if="app.isLoggedIn()">{{ app.adminName() }}</span>
              <button type="button" class="btn btn-outline-success" ng-if="app.isLoggedIn()" ng-click="app.logout()">Logout</button>
            </div>
          </div>
        </div>
      </div>
    </nav>
  </header>

  <main class="shell">
    <section class="flash alert alert-success mt-3" ng-if="app.successMessage()">{{ app.successMessage() }}</section>
    <section class="flash alert alert-danger mt-3" ng-if="app.errorMessage()">{{ app.errorMessage() }}</section>
    <div ng-view></div>
  </main>

  <script src="vendor/bootstrap.bundle.min.js"></script>
  <script src="vendor/angular.min.js"></script>
  <script src="vendor/angular-route.min.js"></script>
  <script src="vendor/xlsx.full.min.js"></script>
  <script src="app/app.js"></script>
</body>
</html>
